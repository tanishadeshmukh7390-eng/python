<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); min-height:100vh;">

<div class="container py-4">

    <a href="/subjects" class="btn btn-light mb-4">
        ← Back
    </a>

    <h1 style="text-align:center; color:white; font-weight:bold; margin-bottom:30px;">
        🏆 Leaderboard
    </h1>

    <div class="table-responsive">

        <table class="table table-bordered table-hover text-center shadow bg-white rounded">

            <thead class="table-primary">

                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Subject</th>
                    <th>Score</th>
                    <th>Time (sec)</th>
                </tr>

            </thead>

            <tbody>

            {% for row in rows %}

                <tr
                {% if loop.index==1 %}
                style="background:#FFD700; font-weight:bold;"
                {% elif loop.index==2 %}
                style="background:#C0C0C0; font-weight:bold;"
                {% elif loop.index==3 %}
                style="background:#CD7F32; color:white; font-weight:bold;"
                {% endif %}
                >

                    <td>
                        {% if loop.index==1 %}
                            🥇
                        {% elif loop.index==2 %}
                            🥈
                        {% elif loop.index==3 %}
                            🥉
                        {% else %}
                            {{ loop.index }}
                        {% endif %}
                    </td>

                    <td>{{ row["Name"] }}</td>

                    <td>{{ row["subject"] }}</td>

                    <td>{{ row["Score"] }}</td>

                    <td>{{ row["Time"] }}</td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
