<!DOCTYPE html>
<html>
    <head>
        <title> Live Search </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-4"></div>
            <h2 class ="fw-bold mb-4">Student Live Search Demo </h2>

            <!-- Search input -->
            <input type="text"
            id ="searchInput"
            class="form-control mb-3"
            placeholder = "Type to search...">

            <!-- Table -->
            <table class ="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Marks</th>
                        <th>Subject</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <tr data-name ="ankita Bore">
                        <!-- data-name - JS information  -->
                        <td>Ankita Bore</td>
                        <td>1001</td>
                        <td>98</td>
                        <td>Python</td>
                    </tr>
                    <tr data-name ="sayali chavhan">
                        <!-- data-name - JS information  -->
                        <td>Sayali chavhan</td>
                        <td>1002</td>
                        <td>90</td>
                        <td>Java</td>
                    </tr>
                    <tr data-name ="shreya More">
                        <!-- data-name - JS information  -->
                        <td>Shreya More</td>
                        <td>1003</td>
                        <td>93</td>
                        <td>Java</td>
                    </tr>
                    <tr data-name ="shreya Chavhan">
                        <!-- data-name - JS information  -->
                        <td>Shreya chavhan</td>
                        <td>1004</td>
                        <td>92</td>
                        <td>html</td>
                    </tr>
                    
                </tbody>
            </table>
        </div>
        <script>
            const searchInput = document.getElementById('searchInput');
            const allRows = document.querySelectorAll('#tableBody tr');
            searchInput.addEventListener('keyup',function() {
                const query = this.value.toLowerCase();
                allRows.forEach(function(row){
                    const name = row.dataset.name;
                    if(name.includes(query)){
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                })
            })
            
        </script>
    </body>
</html>
