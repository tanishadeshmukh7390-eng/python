{% extends 'base.html' %}
{% block title %}Candidate Detail — Study quiz hub{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <!-- Detail card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header py-3"
                 style="background-color: #5f3f1e;">
                <h4 class="mb-0 text-white">
                    👤 Candidate Detail
                </h4>
            </div>
            <div class="card-body p-4">
                <!-- Avatar -->
                 <div class="text-center mb-4">
                    <div class="avatar rounded-circle bg-secondary text-white
                                d-inline-flex align-items-center justify-content-center"
                         style="width: 80px; height: 80px; font-size: 30px;">
                        {{ students['Student_name'][0]|upper }}
                    </div>
                    <h3 class="fw-bold">{{ students['Student_name'] }} </h3>
                </div>

                <!-- Details -->
                 <table class="table table-borderless">
                    <tr>
                        <th class="text-muted fw-bold">Username:</th>
                        <td>{{ students['username'] }}</td>
                    </tr>
                    <tr>
                        <td class="text-muted fw-bold">Email:</td>
                        <td>{{ students['email'] }}</td>

                    
                    </tr>   
                    </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}
