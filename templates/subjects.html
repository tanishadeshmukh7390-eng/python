{% extends "base.html" %}
{% block title %}Subjects - College Portal{% endblock %}
{% block content %}
<h2 class="fw-bold mb-4">Subjects Overview</h2>
<div class="row">
{% for row in rows %}
<div class="col-md-3 mb-3">
    <div class="card shadow-sm text-center p-3">
        <h2 class="fw-bold" style="color:#1e3a5f;"></h2>{{ row['student_count'] }}</h2>
        <p>{{ row['subject_name'] }}</p>
    </div>
</div>
{% endfor %}
</div>
{% endblock %}
